name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - trunk
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: none

      - run: npm run test
      - run: npm run lint:php
